<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐍 Snake Domain .io | Conquiste seu Império</title>
    <!-- SEO -->
    <meta name="description" content="Um jogo multiplayer onde cobras lutam por domínio geográfico. Cerque áreas, ganhe bônus e domine o mapa!">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="game-container">
        <!-- Render Layers -->
        <canvas id="bg-layer"></canvas>
        <canvas id="trail-layer"></canvas>
        <canvas id="entity-layer"></canvas>
        
        <div id="ui-layer">
            <div class="hud-top">
                <div class="score-panel">
                    <h1 id="score-text">Território: 0%</h1>
                    <div id="stats-panel">
                        <span id="best-score-text">Recorde: 0%</span> | 
                        <span id="last-score-text">Último: 0%</span>
                    </div>
                </div>

                <div id="leaderboard">
                    <h3>Top Dominios</h3>
                    <ul id="leaderboard-list">
                        <!-- Filled by JS -->
                    </ul>
                </div>
            </div>

            <div id="power-ups-hud">
                <div class="power-up-icon" id="pow-turbo" title="Turbo Orb">
                    ⚡
                    <div class="power-up-timer" id="timer-turbo"></div>
                </div>
                <div class="power-up-icon" id="pow-venom" title="Venom Trail">
                    🧪
                    <div class="power-up-timer" id="timer-venom"></div>
                </div>
                <div class="power-up-icon" id="pow-shield" title="Shield Skin">
                    🛡️
                    <div class="power-up-timer" id="timer-shield"></div>
                </div>
            </div>

            <div id="minimap-container">
                <canvas id="minimap-layer"></canvas>
            </div>
        </div>

        <!-- Overlays -->
        <div id="start-screen" class="overlay">
            <h2>Snake Domain</h2>
            <p style="margin-bottom: 20px; color: #a0a0b0;">ESCOLHA SUA COR E DOMINE O MAPA</p>
            
            <div id="color-selection">
                <!-- Buttons generated by JS -->
            </div>

            <button class="btn-primary" id="start-btn" style="margin-top: 20px;">Começar Dominação</button>
            <div class="shortcut-hint">
                Use <kbd>WASD</kbd> ou o <kbd>Mouse</kbd> para guiar sua cobra.<br>
                Retorne à sua cor para fechar o território.
            </div>
        </div>

        <div id="game-over-screen" class="overlay hidden">
            <h2 style="color: #ff3366;">Domínio Encerrado</h2>
            <p id="death-reason">Motivo da morte</p>
            <p id="final-score">Pontuação: 0%</p>
            <button class="btn-primary" id="respawn-btn">Tentar Novamente</button>
        </div>

        <div id="pause-screen" class="overlay hidden">
            <h2>Pausado</h2>
            <button class="btn-primary" id="resume-btn">Continuar</button>
        </div>
    </div>

    <!-- Core Game Engine -->
    <script src="./script.js"></script>
</body>
</html>
