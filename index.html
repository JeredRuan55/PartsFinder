<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky Dash - Flappy Style</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <!-- Parallax Backgrounds inside canvas -->
        <canvas id="gameCanvas"></canvas>
        
        <div id="ui-layer">
            <h1 id="score-display" class="hidden">0</h1>
            
            <div id="start-screen" class="glass-panel">
                <div class="logo-container">
                    <h2>Sky Dash</h2>
                    <span class="subtitle">Flappy Style</span>
                </div>
                <div class="instructions">
                    <div class="key-icon">↑</div>
                    <p>Clique, Toque ou Pressione Espaço para voar!</p>
                </div>
            </div>

            <div id="game-over-screen" class="glass-panel hidden">
                <h2 class="game-over-title">Game Over!</h2>
                <div class="score-board">
                    <div class="score-box">
                        <span class="score-label">Score</span>
                        <span id="final-score" class="score-value">0</span>
                    </div>
                    <div class="score-box">
                        <span class="score-label">Melhor</span>
                        <span id="best-score" class="score-value">0</span>
                    </div>
                </div>
                <button id="restart-btn" class="btn primary-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                    Tentar Novamente
                </button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
