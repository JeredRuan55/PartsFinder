<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 Snake Domain .io</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="game-container">
        <!-- Otimização: Camadas separadas -->
        <canvas id="bg-layer"></canvas>
        <canvas id="trail-layer"></canvas>
        <canvas id="entity-layer"></canvas>
        <canvas id="minimap-layer"></canvas>
        
        <div id="ui-layer">
            <h1 id="score-text">Território: 0%</h1>
            <div id="stats-panel">
                <p id="best-score-text">Recorde: 0%</p>
                <p id="last-score-text">Último: 0%</p>
            </div>
            <div id="game-over-screen" class="hidden">
                <h2>Você foi eliminado!</h2>
                <p id="death-reason">Motivo da morte</p>
                <p id="final-score" style="margin-bottom: 20px; font-weight: bold; color: #fff;">Sua pontuação final: 0%</p>
                <button id="respawn-btn">Jogar Novamente</button>
            </div>
            <div id="pause-screen" class="hidden">
                <h2>Jogo Pausado</h2>
                <button id="resume-btn">Continuar</button>
            </div>
            <div id="leaderboard">
                <h3>Top Players</h3>
                <ol id="leaderboard-list">
                    <li>Player 1</li>
                </ol>
            </div>
        </div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
